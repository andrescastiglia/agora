name: Deploy oracle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  image:
    name: publish-image
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable multi-architecture image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/andrescastiglia/agora:${{ github.sha }}
            ghcr.io/andrescastiglia/agora:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Attest image provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ghcr.io/andrescastiglia/agora
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy:
    name: deploy-oracle
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: oracle
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
      ORACLE_USER: ${{ secrets.ORACLE_USER }}
      ORACLE_DEPLOY_PATH: ${{ vars.ORACLE_DEPLOY_PATH }}
      IMAGE: ghcr.io/andrescastiglia/agora@${{ needs.image.outputs.digest }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Configure verified SSH identity
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.ORACLE_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
      - name: Upload deployment manifests
        run: |
          scp -P "$ORACLE_PORT" compose.production.yml scripts/deploy-oracle.sh \
            "$ORACLE_USER@$ORACLE_HOST:$ORACLE_DEPLOY_PATH/"
      - name: Deploy exact image digest with automatic rollback
        run: |
          ssh -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            "chmod 0750 '$ORACLE_DEPLOY_PATH/deploy-oracle.sh' && \
             ORACLE_DEPLOY_PATH='$ORACLE_DEPLOY_PATH' \
             '$ORACLE_DEPLOY_PATH/deploy-oracle.sh' '$IMAGE'"
      - name: Verify public readiness
        run: curl --fail --silent --show-error --max-time 15 https://agora.maese.com.ar/ready
