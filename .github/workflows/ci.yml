name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agora_test
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agora -d agora_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://agora:agora@localhost:5432/agora_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Run tests
        run: cargo test --workspace --all-features --all-targets --locked
      - name: Install coverage tool
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Enforce line coverage
        run: >-
          cargo llvm-cov --workspace --all-features --locked
          --lcov --output-path lcov.info --fail-under-lines 81
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: warn
          retention-days: 14

  security:
    name: security
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.0 --locked
      - name: Audit dependencies
        run: cargo audit

  docker:
    name: docker
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          tags: agora:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
