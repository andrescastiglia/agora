name: Deploy oracle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  image:
    name: publish-image-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish immutable multi-architecture image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/andrescastiglia/agora,push-by-digest=true,name-canonical=true,push=true
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=deploy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=deploy-${{ matrix.arch }}
      - name: Export platform digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid platform digest" >&2
            exit 1
          fi
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"
      - name: Upload platform digest
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: publish-image-index
    needs: image
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Download platform digests
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish and verify multi-architecture index
        id: manifest
        env:
          IMAGE: ghcr.io/andrescastiglia/agora
        run: |
          mapfile -t digest_files < <(find /tmp/digests -maxdepth 1 -type f -printf '%f\n' | sort)
          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "Expected two platform digests, found ${#digest_files[@]}" >&2
            exit 1
          fi

          sources=()
          for digest in "${digest_files[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "Invalid platform digest file" >&2
              exit 1
            fi
            sources+=("$IMAGE@sha256:$digest")
          done

          docker buildx imagetools create \
            --tag "$IMAGE:$GITHUB_SHA" \
            --tag "$IMAGE:main" \
            "${sources[@]}"

          manifest="$(docker buildx imagetools inspect \
            "$IMAGE:$GITHUB_SHA" --format '{{json .Manifest}}')"
          digest="$(jq -r '.digest' <<<"$manifest")"
          platforms="$(jq -r \
            '[.manifests[] | select(.platform.os == "linux") | .platform.architecture] |
             unique | sort | join(",")' <<<"$manifest")"
          if [ "$platforms" != "amd64,arm64" ]; then
            echo "Unexpected image platforms: $platforms" >&2
            exit 1
          fi
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid image index digest" >&2
            exit 1
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Attest image provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ghcr.io/andrescastiglia/agora
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  deploy:
    name: deploy-oracle
    needs: manifest
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: oracle
    permissions:
      contents: read
      packages: read
    env:
      ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
      ORACLE_PORT: ${{ secrets.ORACLE_PORT }}
      ORACLE_USER: ${{ secrets.ORACLE_USER }}
      ORACLE_DEPLOY_PATH: ${{ vars.ORACLE_DEPLOY_PATH }}
      IMAGE: ghcr.io/andrescastiglia/agora@${{ needs.manifest.outputs.digest }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Configure verified SSH identity
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.ORACLE_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts
      - name: Upload deployment manifests
        run: |
          scp -P "$ORACLE_PORT" compose.production.yml scripts/deploy-oracle.sh \
            "$ORACLE_USER@$ORACLE_HOST:$ORACLE_DEPLOY_PATH/"
      - name: Authenticate oracle to GHCR for this deployment
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh -p "$ORACLE_PORT" \
            "$ORACLE_USER@$ORACLE_HOST" \
            "docker login ghcr.io --username '$GITHUB_ACTOR' --password-stdin"
      - name: Deploy exact image digest with automatic rollback
        run: |
          ssh -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            "chmod 0750 '$ORACLE_DEPLOY_PATH/deploy-oracle.sh' && \
             ORACLE_DEPLOY_PATH='$ORACLE_DEPLOY_PATH' \
             '$ORACLE_DEPLOY_PATH/deploy-oracle.sh' '$IMAGE'"
      - name: Verify public readiness
        run: |
          ssh -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            "curl --fail --silent --show-error --max-time 15 \
             https://agora.maese.com.ar/ready"
      - name: Remove temporary GHCR credential
        if: always()
        continue-on-error: true
        run: |
          ssh -p "$ORACLE_PORT" "$ORACLE_USER@$ORACLE_HOST" \
            "docker logout ghcr.io"
